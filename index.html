<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1668e0" />
    <title>Ledgr — the local-first social universe</title>
    <meta name="description" content="Ledgr is a decentralized, local-first social platform that runs in your browser. You own your identity, your feed is generated locally by on-device AI, and communication is peer-to-peer. No accounts, no servers, ~$0 to host." />

    <!-- Progressive Web App: installable on Android (Chrome/Edge) and iOS
         (Safari → Share → Add to Home Screen). All paths are relative so the
         install works from any deploy path (domain root, Pages subpath, IPFS). -->
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ledgr" />
    <style>
      html, body, #root { height: 100%; margin: 0; }
      body { background: #f0f2f5; color: #0f1419; font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overscroll-behavior: none; overflow-x: hidden; }
      
      @media (prefers-color-scheme: dark) {
        body { background: #0f1419; color: #f7f9fa; }
      }
      
      #boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        z-index: 9999;
        transition: opacity .4s cubic-bezier(0.4, 0, 0.2, 1);
        background: radial-gradient(circle at 20% 20%, #e0eefe 0%, transparent 60%),
                    radial-gradient(circle at 80% 80%, #f3e8ff 0%, transparent 60%),
                    #ffffff;
      }
      
      @media (prefers-color-scheme: dark) {
        #boot {
          background: radial-gradient(circle at 20% 30%, #1e293b 0%, transparent 60%),
                      radial-gradient(circle at 80% 80%, #0f172a 0%, transparent 60%),
                      #0b0f19;
        }
      }
      
      #boot .boot-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 12px;
      }
      
      #boot .boot-logo {
        width: 80px;
        height: 80px;
        border-radius: 18px;
        box-shadow: 0 8px 30px rgba(0,0,0,0.08);
      }
      
      @media (prefers-color-scheme: dark) {
        #boot .boot-logo {
          box-shadow: 0 8px 30px rgba(0,0,0,0.3);
        }
      }
      
      #boot .mark {
        font-family: "Inter", -apple-system, sans-serif;
        font-weight: 800;
        font-size: 26px;
        letter-spacing: -0.02em;
        color: #0f1419;
        margin-top: 8px;
      }
      
      @media (prefers-color-scheme: dark) {
        #boot .mark {
          color: #f7f9fa;
        }
      }
      
      #boot .loader-bar {
        position: relative;
        width: 120px;
        height: 3px;
        background-color: rgba(29, 155, 240, 0.12);
        border-radius: 999px;
        overflow: hidden;
        margin-top: 12px;
      }
      
      #boot .loader-bar-fill {
        position: absolute;
        height: 100%;
        width: 50%;
        background-color: #1d9bf0;
        border-radius: 999px;
        animation: loading-bar 1.5s infinite cubic-bezier(0.4, 0, 0.2, 1);
      }
      
      @keyframes loading-bar {
        0% { left: -50%; }
        100% { left: 100%; }
      }
    </style>
  </head>
  <body class="bl-root" data-bl-theme="blue">
    <div id="boot">
      <div class="boot-inner">
        <img class="boot-logo" src="logo.png" alt="Ledgr" />
        <div class="mark">Ledgr</div>
        <div class="loader-bar"><div class="loader-bar-fill"></div></div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
