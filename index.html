<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1668e0" />
    <title>Ledgr — the local-first social universe</title>
    <meta name="description" content="Ledgr is a decentralized, local-first social platform that runs in your browser. You own your identity, your feed is generated locally by on-device AI, and communication is peer-to-peer. No accounts, no servers, ~$0 to host." />

    <!-- Progressive Web App: installable on Android (Chrome/Edge) and iOS
         (Safari → Share → Add to Home Screen). All paths are relative so the
         install works from any deploy path (domain root, Pages subpath, IPFS). -->
    <link rel="manifest" href="manifest.webmanifest" />
    <link rel="icon" href="favicon.ico" sizes="any" />
    <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png" />
    <link rel="apple-touch-icon" href="apple-touch-icon.png" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Ledgr" />
    <style>
      html, body, #root { height: 100%; margin: 0; }
      body { background: #f0f2f5; color: #0f1419; font-family: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; overscroll-behavior: none; overflow-x: hidden; }
      
      @media (prefers-color-scheme: dark) {
        body { background: #0f1419; color: #f7f9fa; }
      }
      
      #boot {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        z-index: 9999;
        transition: opacity .4s cubic-bezier(0.4, 0, 0.2, 1);
        background: radial-gradient(circle at 20% 20%, #e0eefe 0%, transparent 60%),
                    radial-gradient(circle at 80% 80%, #f3e8ff 0%, transparent 60%),
                    #ffffff;
      }
      
      @media (prefers-color-scheme: dark) {
        #boot {
          background: radial-gradient(circle at 20% 30%, #1e293b 0%, transparent 60%),
                      radial-gradient(circle at 80% 80%, #0f172a 0%, transparent 60%),
                      #0b0f19;
        }
      }
      
      #boot .boot-inner {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
      }
      
      #boot .logo-wrapper {
        position: relative;
        display: flex;
        align-items: center;
        justify-content: center;
        width: 120px;
        height: 120px;
      }
      
      #boot .glow-ring {
        position: absolute;
        width: 104px;
        height: 104px;
        border-radius: 50%;
        border: 2px solid transparent;
        border-top-color: #1d9bf0;
        border-bottom-color: rgba(29, 155, 240, 0.1);
        border-left-color: #1d9bf0;
        border-right-color: rgba(29, 155, 240, 0.1);
        animation: spin-orbit 2s linear infinite;
      }
      
      @keyframes spin-orbit {
        0% { transform: rotate(0deg); }
        100% { transform: rotate(360deg); }
      }
      
      #boot .logo-container {
        position: relative;
        overflow: hidden;
        border-radius: 18px;
        width: 80px;
        height: 80px;
        display: grid;
        place-items: center;
        box-shadow: 0 8px 30px rgba(0,0,0,0.06);
      }
      
      @media (prefers-color-scheme: dark) {
        #boot .logo-container {
          box-shadow: 0 8px 30px rgba(0,0,0,0.25);
        }
      }
      
      #boot .boot-logo {
        width: 80px;
        height: 80px;
        display: block;
      }
      
      #boot .shimmer {
        position: absolute;
        top: 0;
        left: -150%;
        width: 150%;
        height: 100%;
        background: linear-gradient(
          90deg,
          rgba(255, 255, 255, 0) 0%,
          rgba(255, 255, 255, 0.35) 50%,
          rgba(255, 255, 255, 0) 100%
        );
        transform: skewX(-20deg);
        animation: sweep-shimmer 2.5s infinite ease-in-out;
      }
      
      @keyframes sweep-shimmer {
        0% { left: -150%; }
        50% { left: 150%; }
        100% { left: 150%; }
      }
      
      #boot .mark {
        font-family: "Inter", -apple-system, sans-serif;
        font-weight: 800;
        font-size: 26px;
        letter-spacing: -0.02em;
        color: #0f1419;
        margin-top: 10px;
      }
      
      @media (prefers-color-scheme: dark) {
        #boot .mark {
          color: #f7f9fa;
        }
      }
      
      #boot .wave-loader {
        display: flex;
        gap: 6px;
        margin-top: 16px;
        height: 8px;
        align-items: center;
      }
      
      #boot .wave-loader span {
        width: 6px;
        height: 6px;
        background-color: #1d9bf0;
        border-radius: 50%;
        animation: wave-bounce 1.4s infinite ease-in-out;
      }
      
      @keyframes wave-bounce {
        0%, 100% { transform: translateY(0); opacity: 0.35; }
        50% { transform: translateY(-6px); opacity: 1; }
      }
    </style>
  </head>
  <body class="bl-root" data-bl-theme="blue">
    <div id="boot">
      <div class="boot-inner">
        <div class="logo-wrapper">
          <div class="glow-ring"></div>
          <div class="logo-container">
            <img class="boot-logo" src="logo.png" alt="Ledgr" />
            <div class="shimmer"></div>
          </div>
        </div>
        <div class="mark">Ledgr</div>
        <div class="wave-loader">
          <span style="animation-delay: 0s"></span>
          <span style="animation-delay: 0.15s"></span>
          <span style="animation-delay: 0.3s"></span>
          <span style="animation-delay: 0.45s"></span>
          <span style="animation-delay: 0.6s"></span>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
